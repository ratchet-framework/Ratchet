[project]
name = "ratchet-factory"
version = "0.1.0"
description = "Scaffold and generate agents and modules for the Ratchet framework"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Aaron Benson" },
]
dependencies = [
    "ratchet-core>=0.1.0",
]

[project.scripts]
ratchet = "ratchet.factory.cli:main"

[project.urls]
Homepage = "https://getratchet.dev"
Repository = "https://github.com/ratchet-framework/Ratchet"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ratchet"]

[tool.hatch.build.targets.editable]
packages = ["src/ratchet"]
